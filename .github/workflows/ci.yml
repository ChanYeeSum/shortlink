name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  issues:
    types: [ opened, edited ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 处理 Issue - 自动添加短链接
  process-issue:
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'shortlink')
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Parse Issue and Add Link
      env:
        ISSUE_BODY: ${{ github.event.issue.body }}
        ISSUE_TITLE: ${{ github.event.issue.title }}
      run: |
        # 提取短链接代码
        CODE=$(echo "$ISSUE_BODY" | grep -oP '\*\*短链接代码\*\*:\s*`\K[^`]+' || echo "")
        if [ -z "$CODE" ]; then
          CODE=$(echo "$ISSUE_TITLE" | grep -oP '\[ShortLink\] 添加短链接:\s*\K.+' | xargs || echo "")
        fi
        
        # 提取原始链接
        URL=$(echo "$ISSUE_BODY" | grep -oP '\*\*原始链接\*\*:\s*\K.+' | xargs || echo "")
        
        # 检查是否为私有链接
        IS_PRIVATE=$(echo "$ISSUE_BODY" | grep -oP '\*\*私有\*\*:\s*\Ktrue' || echo "")
        
        if [ -z "$CODE" ] || [ -z "$URL" ]; then
          echo "无法解析短链接代码或URL"
          exit 1
        fi
        
        echo "短链接代码: $CODE"
        echo "原始链接: $URL"
        echo "私有: ${IS_PRIVATE:-false}"
        
        # 更新 links.json
        cd docs/data
        node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('links.json', 'utf-8'));
          
          // 检查是否已存在
          if (data.links.find(l => l.code === '$CODE')) {
            console.log('短链接已存在');
            process.exit(0);
          }
          
          const newLink = {
            code: '$CODE',
            url: '$URL',
            created_at: new Date().toISOString(),
            private: '${IS_PRIVATE}' === 'true'
          };
          
          data.links.unshift(newLink);
          
          fs.writeFileSync('links.json', JSON.stringify(data, null, 2));
          console.log('短链接添加成功');
        "
        
    - name: Commit changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add docs/data/links.json
        git diff --quiet && git diff --staged --quiet || git commit -m "docs: add shortlink from issue #${{ github.event.issue.number }}"
        git push
        
    - name: Close Issue
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            state: 'closed'
          });
          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: '✅ 短链接已添加！请等待 GitHub Pages 部署完成后访问。'
          });

  # 部署到 GitHub Pages
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'docs'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      
    - name: Summary
      run: |
        echo "## 🚀 部署成功！" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "访问地址: https://chanyeesum.github.io/shortlink/" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 使用方法：" >> $GITHUB_STEP_SUMMARY
        echo "1. 访问首页，填写表单创建短链接" >> $GITHUB_STEP_SUMMARY
        echo "2. 可勾选「私有链接」隐藏链接" >> $GITHUB_STEP_SUMMARY
        echo "3. 点击生成的 Issue 链接确认" >> $GITHUB_STEP_SUMMARY
        echo "4. 等待自动部署完成即可使用" >> $GITHUB_STEP_SUMMARY
