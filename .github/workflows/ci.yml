name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    # 每小时同步一次数据（可选）
    - cron: '0 * * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm test
      
    - name: Health check
      run: |
        node -c backend/server.js
        echo "✅ Syntax check passed"

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --production
      
    - name: Create deployment package
      run: |
        mkdir -p deploy
        cp -r backend deploy/
        cp -r frontend deploy/
        cp package.json deploy/
        cp package-lock.json deploy/ 2>/dev/null || true
        cd deploy && npm ci --production
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: shortlink-app
        path: deploy/

  # 同步数据变更回仓库（可选）
  sync-data:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'schedule'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: shortlink-app
        path: deploy/
        
    - name: Check for data changes
      id: check_changes
      run: |
        if [ -f "deploy/backend/data/links.json" ]; then
          cp deploy/backend/data/links.json backend/data/links.json
          if git diff --quiet backend/data/links.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit data changes
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add backend/data/links.json
        git commit -m "chore: update links data [skip ci]"
        git push
        
    - name: Summary
      run: |
        echo "## 📊 Data Sync" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
          echo "✅ Data changes committed to repository" >> $GITHUB_STEP_SUMMARY
        else
          echo "ℹ️ No data changes to commit" >> $GITHUB_STEP_SUMMARY
        fi

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: shortlink-app
        path: deploy/
        
    - name: Deploy summary
      run: |
        echo "## 🚀 Deployment Ready!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "The application is ready for deployment." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Files prepared:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        find deploy -type f | head -20 >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### To deploy manually:" >> $GITHUB_STEP_SUMMARY
        echo "1. Download the artifact from this workflow run" >> $GITHUB_STEP_SUMMARY
        echo "2. Upload to your server" >> $GITHUB_STEP_SUMMARY
        echo "3. Run: \`npm start\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Data Persistence:" >> $GITHUB_STEP_SUMMARY
        echo "- Data stored in: \`backend/data/links.json\`" >> $GITHUB_STEP_SUMMARY
        echo "- Data is committed to repository automatically" >> $GITHUB_STEP_SUMMARY
