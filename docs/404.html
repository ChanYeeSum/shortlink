<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>跳转中...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      text-align: center;
      background: white;
      padding: 40px 60px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    a {
      color: #667eea;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .error {
      color: #e74c3c;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p id="message">正在跳转...</p>
    <p id="error" class="error" style="display:none;"></p>
    <p id="home" style="display:none;"><a href="/">返回首页</a></p>
  </div>
  
  <script>
    const GITHUB_REPO = 'ChanYeeSum/shortlink';
    const BASE_URL = `https://${GITHUB_REPO.split('/')[0].toLowerCase()}.github.io/${GITHUB_REPO.split('/')[1]}`;
    
    async function redirect() {
      // 获取当前路径
      const path = window.location.pathname;
      const basePath = '/shortlink';
      
      // 提取短链接代码
      let code = path;
      if (path.startsWith(basePath)) {
        code = path.substring(basePath.length);
      }
      code = code.replace(/^\//, '').replace(/\/$/, '');
      
      // 如果没有代码，跳转到首页
      if (!code) {
        window.location.href = BASE_URL + '/';
        return;
      }
      
      try {
        // 获取链接数据
        const response = await fetch(BASE_URL + '/data/links.json?t=' + Date.now());
        const data = await response.json();
        
        // 查找链接
        const link = data.links.find(l => l.code === code);
        
        if (link) {
          // 跳转到原始链接
          window.location.href = link.url;
        } else {
          showError(`短链接 /${code} 不存在`);
        }
      } catch (err) {
        showError('加载失败: ' + err.message);
      }
    }
    
    function showError(msg) {
      document.getElementById('message').style.display = 'none';
      document.querySelector('.spinner').style.display = 'none';
      document.getElementById('error').textContent = msg;
      document.getElementById('error').style.display = 'block';
      document.getElementById('home').style.display = 'block';
    }
    
    redirect();
  </script>
</body>
</html>
