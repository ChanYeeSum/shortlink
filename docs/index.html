<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>短链接服务 | ShortLink</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔗 ShortLink</h1>
      <p>简单、快速的短链接服务</p>
    </header>

    <main>
      <div class="card">
        <h2>创建短链接</h2>
        <p class="hint">提交后短链接仅显示一次，请立即保存</p>
        <form id="shortenForm">
          <div class="form-group">
            <label for="urlInput">原始链接 URL</label>
            <input type="url" id="urlInput" placeholder="https://example.com/very/long/url" required>
          </div>
          <div class="form-group">
            <label for="codeInput">短链接代码（可选，留空自动生成）</label>
            <input type="text" id="codeInput" placeholder="mylink" pattern="[a-zA-Z0-9-_]+">
          </div>
          <button type="submit" class="btn-primary">创建短链接</button>
        </form>
        
        <div id="result" class="result hidden">
          <div class="result-icon">✅</div>
          <p class="result-title">短链接创建成功！</p>
          <p class="result-hint">⚠️ 此链接仅显示一次，请立即复制保存</p>
          <div class="short-link-box">
            <input type="text" id="shortUrlInput" readonly>
            <button id="copyBtn" class="btn-copy">复制</button>
          </div>
          <a id="createAnother" href="#" class="btn-link">创建新链接</a>
        </div>
      </div>

      <div class="card info-card">
        <h3>📖 使用说明</h3>
        <ul>
          <li>创建成功后，短链接<strong>仅显示一次</strong></li>
          <li>请立即复制保存，关闭页面后将无法再次查看</li>
          <li>短链接永久有效，可直接访问跳转</li>
        </ul>
      </div>
    </main>

    <footer>
      <p>Powered by GitHub Pages | <a href="https://github.com/ChanYeeSum/shortlink" target="_blank">GitHub</a></p>
    </footer>
  </div>

  <script>
    const GITHUB_REPO = 'ChanYeeSum/shortlink';
    const BASE_URL = `https://${GITHUB_REPO.split('/')[0].toLowerCase()}.github.io/${GITHUB_REPO.split('/')[1]}`;
    
    // 生成短码
    function generateCode() {
      const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
      let code = '';
      for (let i = 0; i < 6; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return code;
    }
    
    // 表单提交
    document.getElementById('shortenForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const url = document.getElementById('urlInput').value.trim();
      let code = document.getElementById('codeInput').value.trim();
      
      if (!code) {
        code = generateCode();
      }
      
      // 创建 Issue 标题和内容
      const title = `[ShortLink] 添加短链接: ${code}`;
      const body = `**短链接代码**: \`${code}\`\n**原始链接**: ${url}\n**私有**: true\n\n---\n此 Issue 将由 GitHub Actions 自动处理并关闭。`;
      
      // 构建 Issue URL
      const issueUrl = `https://github.com/${GITHUB_REPO}/issues/new?title=${encodeURIComponent(title)}&body=${encodeURIComponent(body)}&labels=shortlink`;
      
      // 显示短链接（仅一次）
      const shortUrl = `${BASE_URL}/${code}`;
      document.getElementById('shortUrlInput').value = shortUrl;
      
      // 隐藏表单，显示结果
      document.getElementById('shortenForm').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');
      
      // 自动提交 Issue（在新窗口）
      window.open(issueUrl, '_blank');
    });
    
    // 复制链接
    document.getElementById('copyBtn').addEventListener('click', async function() {
      const input = document.getElementById('shortUrlInput');
      try {
        await navigator.clipboard.writeText(input.value);
        this.textContent = '已复制';
        this.classList.add('copied');
        setTimeout(() => {
          this.textContent = '复制';
          this.classList.remove('copied');
        }, 2000);
      } catch (err) {
        input.select();
        document.execCommand('copy');
        this.textContent = '已复制';
        setTimeout(() => {
          this.textContent = '复制';
        }, 2000);
      }
    });
    
    // 创建新链接
    document.getElementById('createAnother').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('shortenForm').classList.remove('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('urlInput').value = '';
      document.getElementById('codeInput').value = '';
    });
  </script>
</body>
</html>
